<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Torneo 1 - Air Hockey</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/torneo.css">
    <link rel="stylesheet" href="css/playoffs.css">
</head>
<body>
    <div class="container">
        <h1><img src="img/favicon.png" alt="logo" style="width: 1em; height: 1em; vertical-align: middle; margin-right: 5px;"> Primer torneo de hockey de mesa</h1>

        <div class="panel playoffs-section" style="margin-bottom: 2rem;">
            <h2>👑 Playoffs</h2>
            <div class="playoff-bracket" id="playoff-bracket">
                <!-- Poblado por JS -->
            </div>
            <div id="tercer-puesto-container" style="margin-top: 1rem; text-align: center;">
                <!-- Poblado por JS -->
            </div>
        </div>

        <div class="panel">
            <h2>🏆 Fase de Liga</h2>
            <br>
            <div class="home-container">
                <div>
                    <h3 style="margin-bottom: 1rem; text-align: center; color: #8b949e;">Posiciones</h3>
                    <div class="table-responsive">
                        <table class="ranking-table" id="tabla-posiciones">
                        <thead>
                            <tr>
                                <th>Pos</th>
                                <th>Jugador</th>
                                <th>PJ</th>
                                <th>G</th>
                                <th>P</th>
                                <th>GF</th>
                                <th>GC</th>
                                <th>DIF</th>
                                <th>Pts (Goles)</th>
                            </tr>
                        </thead>
                        <tbody id="tabla-body">
                            <!-- Poblado por JS -->
                        </tbody>
                    </table>
                </div>
                </div>

                <div>
                    <h3 style="margin-bottom: 1rem; text-align: center; color: #8b949e;">Resultados</h3>
                    <div id="resultados-fase">
                        <!-- Poblado por JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Scripts -->
    <script src="js/menu.js"></script>
    <script>
        // Variables globales para simular el comportamiento de playoff.js aunque usemos nuestro render
        window.torneoActual = { config: { formato: "liga", avanzar: 4 } };
        window.partidosJugados = true;
    </script>
    <script src="js/historial_torneos.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            cargarTorneo("Primer torneo de hockey de mesa");
        });
    </script>
</body>
</html>
