<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Partido - Torneo Air Hockey</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/partido.css">
    <link rel="stylesheet" href="css/playoffs.css">
</head>
<body>
    <button id="menu-toggle" class="menu-toggle" title="Abrir Menú">☰</button>
    <nav id="sidebar" class="sidebar">
        <h2>Opciones</h2>
        <a href="index.html" title="Simulador">🏠 Simulador</a>
        <a href="montecarlo.html" title="Cálculo de predicciones">📊 Predicciones</a>
        <a href="partido.html" title="Simulador de Partido 1vs1">⚔️ Partido 1vs1</a>
        <a href="torneo.html" title="Creador de Torneo">🏆 Creador de Torneo</a>
        <a href="playoffs.html" title="Playoffs">🏅 Playoffs</a>
    </nav>
    <div class="container">
        <h1><img src="img/favicon.png" alt="logo" style="width: 1em; height: 1em; vertical-align: middle; margin-right: 5px;"> Simulador de Partido 1vs1</h1>
        <p class="subtitle">Simula un enfrentamiento directo entre dos jugadores</p>

        <div class="controls">
            <div id="playerSelection" style="width: 100%; margin-top: 20px;"></div>
        </div>

        <!-- Barra de probabilidad de victoria -->
        <div id="probabilidadContainer" class="probabilidad-container" style="display:none;">
            <h3>📊 Probabilidad de Victoria</h3>
            <div id="probabilidadContent"></div>
        </div>

        <!-- Historial de enfrentamientos directos -->
        <div id="historialDirecto" class="historial-container" style="display:none;">
            <h3>📜 Historial de Enfrentamientos</h3>
            <div id="historialContent"></div>
        </div>

        <!-- Resultado del partido -->
        <div id="resultado"></div>
    </div>

    <script src="js/menu.js"></script>
    <script src="js/simulador.js"></script>
    <script src="js/partido.js"></script>
</body>
</html>
