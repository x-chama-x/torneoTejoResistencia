<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Partido - Torneo Air Hockey</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/partido.css">
</head>
<body>
    <div class="container">
        <h1>⚔️ Simulador de Partido 1vs1</h1>
        <p class="subtitle">Simula un enfrentamiento directo entre dos jugadores</p>

        <div class="controls">
            <div class="player-selectors">
                <div class="player-select-box blue-box">
                    <label for="jugador1">🔵 Jugador Azul</label>
                    <select id="jugador1">
                        <option value="">Seleccionar jugador...</option>
                    </select>
                </div>

                <div class="vs-divider">
                    <span>VS</span>
                </div>

                <div class="player-select-box red-box">
                    <label for="jugador2">🔴 Jugador Rojo</label>
                    <select id="jugador2">
                        <option value="">Seleccionar jugador...</option>
                    </select>
                </div>
            </div>

            <div class="buttons-row">
                <button id="simularPartidoBtn" disabled>🎲 Simular Partido</button>
            </div>

            <!-- Navigation Links -->
            <div class="nav-links" style="margin-top: 15px; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: center; width: 100%;">
                <a href="index.html" title="Simulador" style="padding:8px 12px; background:#43a047; color:white; border-radius:6px; text-decoration:none; font-weight:700;">🏠 Simulador</a>
                <a href="montecarlo.html" title="Cálculo de predicciones" style="padding:8px 12px; background:#667eea; color:white; border-radius:6px; text-decoration:none; font-weight:700;">📊 Predicciones</a>
                <a href="partido.html" title="Simulador de Partido 1vs1" style="padding:8px 12px; background:#e91e63; color:white; border-radius:6px; text-decoration:none; font-weight:700;">⚔️ Partido 1vs1</a>
                <a href="torneo.html" title="Creador de Torneo" style="padding:8px 12px; background:#11998e; color:white; border-radius:6px; text-decoration:none; font-weight:700;">🏆 Creador de Torneo</a>
                <a href="playoffs.html" title="Playoffs" style="padding:8px 12px; background:#9c27b0; color:white; border-radius:6px; text-decoration:none; font-weight:700;">🏅 Playoffs</a>
            </div>
        </div>

        <!-- Barra de probabilidad de victoria -->
        <div id="probabilidadContainer" class="probabilidad-container" style="display:none;">
            <h3>📊 Probabilidad de Victoria</h3>
            <div id="probabilidadContent"></div>
        </div>

        <!-- Historial de enfrentamientos directos -->
        <div id="historialDirecto" class="historial-container" style="display:none;">
            <h3>📜 Historial de Enfrentamientos</h3>
            <div id="historialContent"></div>
        </div>

        <!-- Resultado del partido -->
        <div id="resultado"></div>
    </div>

    <script src="js/simulador.js"></script>
    <script src="js/partido.js"></script>
</body>
</html>
