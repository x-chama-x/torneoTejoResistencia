<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador Torneo Air Hockey</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <h1>🏑 Simulador de Torneo Air Hockey</h1>
        
        <div class="controls">
            <label for="numPlayers" style="align-self:center; font-weight:600; color:#333; margin-right:6px;">Formato:</label>
            <select id="numPlayers" aria-label="Formato de torneo">
                <option value="7">7 Jugadores</option>
                <option value="8">8 Jugadores</option>
                <option value="9">9 Jugadores</option>
                <option value="10">10 Jugadores</option>
            </select>

            <!-- Selector de modo de armado de grupos -->
            <label for="modoGrupos" id="modoGruposLabel" style="align-self:center; font-weight:600; color:#333; margin-left:12px; margin-right:6px; display:none;">Armado:</label>
            <select id="modoGrupos" aria-label="Modo de armado de grupos" style="display:none;">
                <option value="aleatorio">🎲 Sorteo Aleatorio</option>
                <option value="manual">✋ Armado Manual</option>
            </select>

            <button id="randomSelectBtn" title="Seleccionar jugadores aleatoriamente">🔀 Seleccionar aleatoriamente</button>
            <button id="simularBtn">🎲 Simular Torneo</button>

            <!-- Enlace al Simulador Monte Carlo (abre en la misma pestaña) -->
            <a href="montecarlo.html" id="montecarloLink" title="Abrir Simulador Monte Carlo" style="display:inline-block; margin-left:8px; padding:8px 12px; background:#667eea; color:white; border-radius:6px; text-decoration:none; font-weight:700;">📊 Cálculo de predicciones</a>

            <!-- Enlace al Simulador de Partido 1vs1 -->
            <a href="partido.html" id="partidoLink" title="Abrir Simulador de Partido 1vs1" style="display:inline-block; margin-left:8px; padding:8px 12px; background:#e91e63; color:white; border-radius:6px; text-decoration:none; font-weight:700;">⚔️ Partido 1vs1</a>

            <!-- Enlace al Creador de Torneo -->
            <a href="torneo.html" id="torneoLink" title="Abrir Creador de Torneo" style="display:inline-block; margin-left:8px; padding:8px 12px; background:#11998e; color:white; border-radius:6px; text-decoration:none; font-weight:700;">🏆 Creador de Torneo</a>

            <!-- Enlace a Playoffs -->
            <a href="playoffs.html" id="playoffsLink" title="Abrir Playoffs" style="display:inline-block; margin-left:8px; padding:8px 12px; background:#e91e63; color:white; border-radius:6px; text-decoration:none; font-weight:700;">⚔️ Playoffs</a>
        </div>

        <!-- Contenedor dinámico donde se mostrará la selección de jugadores -->
        <div id="playerSelection"></div>

        <!-- Contenedor para el armado manual de grupos -->
        <div id="gruposManualContainer" style="display:none; margin-top:15px;"></div>

        <div id="resultado"></div>
    </div>

    <script src="js/simulador.js"></script>
</body>
</html>
