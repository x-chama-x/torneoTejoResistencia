<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Air Hockey - Tejo Hockey</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- ═══════════════ MAIN ═══════════════ -->
<div class="container ah-container">
    <!-- ── MENU SCREEN ── -->
    <div id="screen-menu">
        <div class="menu-card">
            <div class="menu-puck"><div class="menu-puck-inner"></div></div>

            <div>
                <h2>Air Hockey</h2>
                <p style="margin-top:6px">Desafiá a la CPU en el clásico juego de mesa.<br>Metele 7 goles para ganar la partida.</p>
            </div>

            <hr class="menu-divider">

            <div class="how-grid">
                <div class="how-item"><span class="how-icon">🖱️</span>Mové el mazo con el mouse</div>
                <div class="how-item"><span class="how-icon">⚡</span>Solo jugás en tu mitad</div>
                <div class="how-item"><span class="how-icon">🎯</span>7 goles para ganar</div>
            </div>

            <button class="btn-start" id="btn-start">▶ &nbsp;Comenzar partida</button>
        </div>
    </div>

    <!-- ── GAME SCREEN ── -->
    <div id="screen-game">
        <div class="game-main-panel">
            <div class="hud">
                <div class="hud-score">
                    <span class="hud-name">CPU</span>
                    <span class="hud-num" id="s-cpu">0</span>
                </div>
                <div class="hud-score">
                    <span class="hud-num" id="s-ply">0</span>
                    <span class="hud-name">Vos</span>
                </div>
            </div>

            <div class="table-wrap" id="table-wrap">
                <canvas id="ah-canvas" width="500" height="640"></canvas>
                <div class="overlay" id="overlay">
                    <div class="overlay-title" id="ov-title"></div>
                    <div class="overlay-sub"   id="ov-sub"></div>
                    <div class="overlay-score" id="ov-score"></div>
                    <button id="btn-replay">🔄 &nbsp;Jugar de nuevo</button>
                    <button class="btn-menu-ov" id="btn-menu-ov">🏠 &nbsp;Menú principal</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/menu.js"></script>
<script src="js/airhockey.js"></script>
</body>
</html>
